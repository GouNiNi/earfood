server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inclure les MIME types par défaut + ajouter .mjs
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # Support pour les SPA (Fallback sur index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CRITIQUE PWA : Ne JAMAIS mettre en cache le Service Worker et le Manifest
    location ~* "\.(?:sw\.js|webmanifest)$" {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    # CRITIQUE PWA : Ne pas mettre en cache index.html pour détecter les nouveaux hash JS/CSS
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # OPTIMISATION : Cache long pour les assets statiques (Vite ajoute des hash dans les noms)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip pour la performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
