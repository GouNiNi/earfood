services:
  # Builder: Compile l'application Vite (JS/CSS minifié + Service Worker)
  builder:
    image: node:20-alpine
    volumes:
      - ./:/app
    working_dir: /app
    # Installe les dépendances et lance le build
    command: sh -c "npm install && npm run build"

  # Nginx: Sert les fichiers compilés (dist)
  earfood:
    image: nginx:alpine
    container_name: earfood
    volumes:
      # On monte le dossier dist généré par le builder
      - ./dist:/usr/share/nginx/html
      # On monte la config Nginx personnalisée pour la PWA
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Debug: Teste la configuration avant de lancer
    command: sh -c "nginx -t && nginx -g 'daemon off;'"
    restart: always
    networks:
      - proxy
    depends_on:
      builder:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.earfood.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.earfood.tls=true
      - traefik.http.routers.earfood.entrypoints=websecure
      - traefik.http.routers.earfood.tls.certresolver=letsencrypt
      - traefik.http.middlewares.earfood.headers.SSLRedirect=true
      - traefik.http.middlewares.earfood.headers.STSSeconds=315360000
      - traefik.http.middlewares.earfood.headers.browserXSSFilter=true
      - traefik.http.middlewares.earfood.headers.contentTypeNosniff=true
      - traefik.http.middlewares.earfood.headers.forceSTSHeader=true
      - traefik.http.middlewares.earfood.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.earfood.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.earfood.headers.STSPreload=true
      - traefik.http.routers.earfood.middlewares=earfood@docker
      - traefik.http.services.earfood.loadbalancer.server.port=80

networks:
  proxy:
    external: true
